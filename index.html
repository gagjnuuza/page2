<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>現場記録</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:#222;transition:.3s}
:root{--bg:#fff;--card:#f5f5f5;--accent:#222}
header{padding:20px 16px 10px;position:sticky;top:0;background:var(--bg);z-index:10}
h1{margin:0;font-size:28px;font-weight:700}
.theme-wrap{display:flex;gap:10px;margin-top:14px;align-items:center}
.color-btn{width:28px;height:28px;border-radius:50%;border:2px solid #ddd;cursor:pointer}
.color-btn.active{border:3px solid #000}
.container{padding:14px}
.form-area{background:var(--card);padding:16px;border-radius:20px;margin-bottom:22px}
label{display:block;margin-top:14px;margin-bottom:8px;font-size:14px;font-weight:600}
input,textarea,select{width:100%;padding:14px;border:none;border-radius:14px;font-size:16px;background:white}
textarea{resize:none;min-height:90px}
button{border:none;border-radius:14px;padding:10px 14px;font-size:14px;cursor:pointer}
.main-btn{width:100%;margin-top:18px;background:var(--accent);color:white;font-weight:700;padding:14px}
.add-venue{display:flex;gap:10px;margin-top:10px}
.add-venue input{flex:1}
.add-venue button,.action-btn{background:var(--accent);color:white}
.records{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--card);border-radius:18px;overflow:hidden;padding:10px}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:14px;margin-bottom:10px}
.card h3{margin:0 0 6px;font-size:16px}
.card p{margin:4px 0;font-size:13px;word-break:break-word}
.card-actions{display:flex;gap:8px;margin-top:10px}
.empty{text-align:center;opacity:.5;padding:30px 10px}
.sort-wrap{margin:10px 0 18px}
</style>
</head>
<body>
<header>
<h1>現場記録</h1>
<div class="theme-wrap">
<div class="color-btn active" style="background:#ffffff" onclick="setTheme('#ffffff','#f5f5f5','#222',this)"></div>
<div class="color-btn" style="background:#ffe5e5" onclick="setTheme('#ffe5e5','#fff1f1','#d85a7f',this)"></div>
<div class="color-btn" style="background:#e7f6e7" onclick="setTheme('#e7f6e7','#f4fff4','#3b8f68',this)"></div>
<div class="color-btn" style="background:#e7efff" onclick="setTheme('#e7efff','#f4f7ff','#5672c9',this)"></div>
<div class="color-btn" style="background:#fff3d9" onclick="setTheme('#fff3d9','#fff9ed','#c48a1a',this)"></div>
</div>
</header>

<div class="container">
<div class="form-area">
<label>日付</label><input type="date" id="date">
<label>公演名</label><input type="text" id="title" placeholder="公演名を入力">
<label>会場名</label>
    <div style="display:flex;gap:8px;">
        <select id="venueSelect" style="flex:1;"></select>
        <button type="button" onclick="manageVenue()">⚙</button></div>
<div class="add-venue">
<input type="text" id="newVenue" placeholder="新規作成">
<button onclick="addVenue()">保存</button>
</div>
<label>座席名</label><input type="text" id="seat">
<label>メモ</label><textarea id="memo"></textarea>
<label>画像</label><input type="file" id="image" accept="image/*">
<button class="main-btn" onclick="saveRecord()">記録を保存</button>
</div>

<div class="sort-wrap">
<select id="sortMode" onchange="renderRecords()">
<option value="asc">日付昇順（古い順）</option>
<option value="desc">日付降順（新しい順）</option>
</select>
</div>

<div class="records" id="records"></div>
</div>

<script>
let venues=JSON.parse(localStorage.getItem("venues"));
    if(!venue || venues.length === 0){venue = ["東京ドームシティシアターGロッソ"];
                                      localStorage.setItem("venues",JSON.stringify(venues));
let records=JSON.parse(localStorage.getItem("records"))||[];
let editingIndex=null;
const venueSelect=document.getElementById("venueSelect");

function renderVenues(){
venues=[...new Set(venues)].sort((a,b)=>a.localeCompare(b,'ja'));
venueSelect.innerHTML="";
const first=document.createElement("option");
first.textContent="会場を追加"; first.value="";
venueSelect.appendChild(first);
venues.forEach(v=>{
if(!v)return;
const o=document.createElement("option");
o.value=v;o.textContent=v;
venueSelect.appendChild(o);
});
localStorage.setItem("venues",JSON.stringify(venues));
}

function addVenue(){
const value=document.getElementById("newVenue").value.trim();
if(!value)return;
venues.push(value);
renderVenues();
venueSelect.value=value;
document.getElementById("newVenue").value="";
}
function manageVenue(){
const selected = venueSelect.value;

  if(!selected){
    alert("会場を選択してください");
    return;
  }

  const newName = prompt(
    "会場名を変更してください",
    selected
  );

  if(newName === null){
    return;
  }

  if(newName.trim() === ""){

    if(confirm("この会場を削除しますか？")){

      venues = venues.filter(v => v !== selected);

      renderVenues();
    }

    return;
  }

  venues = venues.map(v =>
    v === selected ? newName.trim() : v
  );

  renderVenues();

  venueSelect.value = newName.trim();
}



function saveRecord(){
const dateInput=document.getElementById("date");
const titleInput=document.getElementById("title");
const seatInput=document.getElementById("seat");
const memoInput=document.getElementById("memo");
const imageInput=document.getElementById("image");

    const record={
        date:dateInput.value,
        title:titleInput.value,
        venue:venueSelect.value,
        seat:seatInput.value,
        memo:memoInput.value,
        image:""
};

if(!record.title){alert("公演名を入力してください");return;}

const file=imageInput.files[0];

function finishSave(img){
    
record.image=img;

if(editingIndex!==null){
records[editingIndex]=record;
editingIndex=null;
}else{
records.push(record);
}


localStorage.setItem("records",JSON.stringify(records));

renderRecords();
clearForm();
}

if(file){

const reader=new FileReader();

reader.onload=function(e){

const img=new Image();

img.onload=function(){

const canvas=document.createElement("canvas");

const maxSize=800;

let width=img.width;
let height=img.height;

if(width>height && width>maxSize){
height*=maxSize/width;
width=maxSize;
}else if(height>maxSize){
width*=maxSize/height;
height=maxSize;
}

canvas.width=width;
canvas.height=height;

const ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,width,height);

const compressedImage=canvas.toDataURL(
"image/jpeg",
0.7
);

finishSave(compressedImage);

};

img.src=e.target.result;

};

reader.readAsDataURL(file);

}else{

if(editingIndex!==null && records[editingIndex].image){
record.image=records[editingIndex].image;
}

finishSave(record.image);

}
}

function renderRecords(){
const area=document.getElementById("records");
area.innerHTML="";

let sorted=[...records].map((r,i)=>({...r,originalIndex:i}));

const mode=document.getElementById("sortMode").value;

sorted.sort((a,b)=>{
const da=new Date(a.date||"9999-12-31");
const db=new Date(b.date||"9999-12-31");
return mode==="asc" ? da-db : db-da;
});

if(sorted.length===0){
area.innerHTML='<div class="empty">記録はまだありません</div>';
return;
}

sorted.forEach(record=>{
const card=document.createElement("div");
card.className="card";
card.innerHTML=`
${record.image?`<img src="${record.image}">`:""}
<h3>${record.title}</h3>
<p>${record.date||""}</p>
<p>${record.venue||""}</p>
<p>${record.seat||""}</p>
<p>${record.memo||""}</p>
<div class="card-actions">
<button class="action-btn" onclick="editRecord(${record.originalIndex})">編集</button>
<button class="action-btn" onclick="deleteRecord(${record.originalIndex})">削除</button>
</div>`;
area.appendChild(card);
});
}

function editRecord(index){
const r=records[index];
document.getElementById("date").value=r.date||"";
document.getElementById("title").value=r.title||"";
venueSelect.value=r.venue||"";
document.getElementById("seat").value=r.seat||"";
document.getElementById("memo").value=r.memo||"";
editingIndex=index;
window.scrollTo({top:0,behavior:"smooth"});
}

function deleteRecord(index){
if(!confirm("削除しますか？")) return;
records.splice(index,1);
localStorage.setItem("records",JSON.stringify(records));
renderRecords();
}

function clearForm(){
document.getElementById("date").value="";
    document.getElementById("title").value="";
    document.getElementById("seat").value="";
    document.getElementById("memo").value="";
    document.getElementById("image").value="";
    venueSelect.value="";
}

function setTheme(bg,card,accent,el){
document.documentElement.style.setProperty('--bg',bg);
document.documentElement.style.setProperty('--card',card);
document.documentElement.style.setProperty('--accent',accent);
document.querySelectorAll(".color-btn").forEach(btn=>btn.classList.remove("active"));
el.classList.add("active");
    localStorage.setItem("theme",JSON.stringify({
        bg:bg,
        card:card,
        accent:accent
        }));
}

renderVenues();
renderRecords();
    const savedTheme=
        JSON.parse(localStorage.getItem("theme"));
    if(savedTheme){
        document.documentElement.style.setProperty('--bg',savedTheme.bg);
        document.documentElement.style.setProperty('--card',savedTheme.card);
        document.documentElement.style.setProperty('--accent',savedTheme.accent);
        }
</script>
</body>
</html>
